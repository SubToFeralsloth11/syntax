<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTAX // Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:2em;margin-bottom:5px;color:#00f0ff;text-shadow:0 0 20px #00f0ff55}
.info{display:flex;gap:40px;margin:5px 0;font-size:1.1em}
.info span{color:#b537f2}
canvas{border:2px solid #00f0ff;box-shadow:0 0 30px #00f0ff33}
.controls{margin-top:15px;display:flex;gap:10px}
button{background:transparent;border:2px solid #b537f2;color:#b537f2;padding:10px 24px;font-family:inherit;font-size:1em;cursor:pointer;transition:all .2s}
button:hover{background:#b537f233;color:#fff}
.hint{color:#666;margin-top:8px;font-size:0.9em}
</style>
</head>
<body>
<h1>SYNTAX // Platformer</h1>
<div class="info">
<div>SCORE: <span id="score">0</span></div>
<div>LIVES: <span id="lives">3</span></div>
</div>
<canvas id="game" width="800" height="500"></canvas>
<div class="controls">
<button onclick="resetGame()">RESTART</button>
</div>
<div class="hint">Arrow Keys / WASD to move | Space to jump</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=800,H=500;
const GRAVITY=0.6,JUMP=-12,SPEED=5;

let player,platforms,coins,enemies,score,lives,gameOver,keys,cameraX;

function init(){
player={x:50,y:400,w:30,h:40,vx:0,vy:0,onGround:false,face:1};
platforms=[
{x:0,y:480,w:800,h:20},
{x:150,y:400,w:120,h:16},
{x:350,y:350,w:100,h:16},
{x:520,y:300,w:140,h:16},
{x:200,y:250,w:100,h:16},
{x:400,y:200,w:120,h:16},
{x:600,y:380,w:100,h:16},
{x:700,y:300,w:100,h:16},
{x:100,y:180,w:80,h:16},
{x:650,y:150,w:120,h:16},
{x:300,y:450,w:80,h:16},
{x:500,y:420,w:60,h:16},
];
coins=[
{x:180,y:370},{x:380,y:320},{x:560,y:270},{x:230,y:220},
{x:430,y:170},{x:630,y:350},{x:730,y:270},{x:120,y:150},
{x:680,y:120},{x:320,y:420},{x:530,y:390},{x:400,y:450},
{x:750,y:460},{x:50,y:450}
];
enemies=[
{x:400,y:330,w:30,h:30,vx:2,minX:350,maxX:490},
{x:650,y:280,w:30,h:30,vx:-2,minX:600,maxX:790},
{x:180,y:370,w:30,h:30,vx:1.5,minX:150,maxX:260},
];
score=0;lives=3;gameOver=false;keys={};cameraX=0;
render();
}

function update(){
if(gameOver)return;

if(keys['ArrowLeft']||keys['KeyA']){player.vx=-SPEED;player.face=-1;}
else if(keys['ArrowRight']||keys['KeyD']){player.vx=SPEED;player.face=1;}
else player.vx*=0.8;

if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&player.onGround){
player.vy=JUMP;player.onGround=false;
}

player.vy+=GRAVITY;
player.x+=player.vx;
player.y+=player.vy;

if(player.x<0)player.x=0;
if(player.x>W-1000+player.w)player.x=W-1000+player.w;

player.onGround=false;
for(const p of platforms){
if(player.x+player.w>p.x&&player.x<p.x+p.w&&
player.y+player.h>p.y&&player.y+player.h<p.y+p.h+15&&player.vy>=0){
player.y=p.y-player.h;player.vy=0;player.onGround=true;
}
}

for(let i=coins.length-1;i>=0;i--){
const c=coins[i];
const dx=player.x+player.w/2-c.x,dy=player.y+player.h/2-c.y;
if(Math.sqrt(dx*dx+dy*dy)<30){
coins.splice(i,1);score+=10;
}
}

for(const e of enemies){
e.x+=e.vx;
if(e.x<=e.minX||e.x+e.w>=e.maxX)e.vx*=-1;

if(player.x+player.w>e.x&&player.x<e.x+e.w&&
player.y+player.h>e.y&&player.y<e.y+e.h){
if(player.vy>0&&player.y+player.h<e.y+e.h/2){
player.vy=JUMP;
score+=20;
e.x=-999;
}else{
loseLife();
}
}
}

cameraX=player.x-W/2+player.w/2;
if(cameraX<0)cameraX=0;
if(cameraX>200)cameraX=200;

document.getElementById('score').textContent=score;
document.getElementById('lives').textContent=lives;

if(coins.length===0){
init();
}

render();
}

function render(){
ctx.fillStyle='#0a0a14';
ctx.fillRect(0,0,W,H);

ctx.save();
ctx.translate(-cameraX,0);

for(const p of platforms){
const grad=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
grad.addColorStop(0,'#b537f2');
grad.addColorStop(1,'#661aa0');
ctx.fillStyle=grad;
ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.strokeStyle='#00f0ff44';
ctx.strokeRect(p.x,p.y,p.w,p.h);
}

for(const c of coins){
ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fillStyle='#ffd700';
ctx.fill();
ctx.strokeStyle='#ffaa00';
ctx.lineWidth=2;
ctx.stroke();
ctx.beginPath();
ctx.arc(c.x,c.y,5,0,Math.PI*2);
ctx.fillStyle='#ffee88';
ctx.fill();
}

for(const e of enemies){
ctx.fillStyle='#ff3344';
ctx.fillRect(e.x,e.y,e.w,e.h);
ctx.fillStyle='#fff';
ctx.fillRect(e.x+5,e.y+5,8,8);
ctx.fillRect(e.x+17,e.y+5,8,8);
ctx.fillStyle='#000';
ctx.fillRect(e.x+7,e.y+7,4,4);
ctx.fillRect(e.x+19,e.y+7,4,4);
}

ctx.fillStyle='#00f0ff';
ctx.fillRect(player.x,player.y,player.w,player.h);
ctx.fillStyle='#0a0a14';
const eyeX=player.x+player.w/2+player.face*5;
ctx.fillRect(eyeX-3,player.y+8,6,6);
ctx.fillStyle='#b537f2';
ctx.fillRect(player.x+2,player.y+player.h-10,player.w-4,8);

ctx.restore();

if(gameOver){
ctx.fillStyle='rgba(0,0,0,0.8)';
ctx.fillRect(0,0,W,H);
ctx.fillStyle='#ff3344';
ctx.font='bold 48px Courier New';
ctx.textAlign='center';
ctx.fillText('GAME OVER',W/2,H/2-20);
ctx.fillStyle='#b537f2';
ctx.font='24px Courier New';
ctx.fillText(`Score: ${score}`,W/2,H/2+20);
ctx.fillStyle='#00f0ff';
ctx.font='18px Courier New';
ctx.fillText('Click RESTART to play again',W/2,H/2+60);
ctx.textAlign='left';
}
}

function loseLife(){
lives--;
if(lives<=0){gameOver=true;}
else{
player.x=50;player.y=400;player.vx=0;player.vy=0;
}
}

function resetGame(){init();}

document.addEventListener('keydown',e=>{
keys[e.code]=true;
if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function gameLoop(){update();requestAnimationFrame(gameLoop);}
init();
gameLoop();
</script>
</body>
</html>
