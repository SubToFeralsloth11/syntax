<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTAX // Sudoku</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f0ff, #b537f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #888; margin-bottom: 20px; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            font-family: inherit;
            padding: 8px 16px;
            background: #1a1a2e;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            cursor: pointer;
            font-size: 1rem;
        }
        select:hover, button:hover { background: #00f0ff; color: #0a0a14; }
        .info-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }
        .info-item { text-align: center; }
        .info-value { font-size: 1.5rem; color: #00f0ff; }
        .info-label { font-size: 0.8rem; color: #888; }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            grid-template-rows: repeat(9, 45px);
            border: 3px solid #b537f2;
            background: #1a1a2e;
        }
        .cell {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid #333;
            background: #0a0a14;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:nth-child(3n) { border-right: 2px solid #b537f2; }
        .cell:nth-child(9n+1) { border-left: 2px solid #b537f2; }
        .cell:nth-child(n+19):nth-child(-n+27) { border-bottom: 2px solid #b537f2; }
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #b537f2; }
        .cell.given { color: #888; background: #12121e; }
        .cell.selected { background: #1a2a3e; box-shadow: inset 0 0 0 2px #00f0ff; }
        .cell.highlight { background: #151528; }
        .cell.conflict { color: #ff4444 !important; background: #2a1515 !important; }
        .cell.user-input { color: #00f0ff; }
        .numpad {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 420px;
        }
        .num-btn {
            width: 40px;
            height: 40px;
            font-family: inherit;
            font-size: 1.2rem;
            background: #1a1a2e;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .num-btn:hover { background: #00f0ff; color: #0a0a14; }
        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .message {
            font-size: 1.3rem;
            min-height: 35px;
            margin: 5px 0;
        }
        .message.win { color: #44ff44; }
        .message.error { color: #ff4444; }
        .message.hint { color: #b537f2; }
    </style>
</head>
<body>
    <h1>SYNTAX // Sudoku</h1>
    <div class="subtitle">Fill the grid so every row, column, and 3x3 box has 1-9</div>
    <div class="info-bar">
        <div class="info-item"><div class="info-value" id="timer">00:00</div><div class="info-label">TIME</div></div>
        <div class="info-item"><div class="info-value" id="hints">3</div><div class="info-label">HINTS</div></div>
    </div>
    <div class="controls">
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
        <button onclick="newGame()">NEW GAME</button>
    </div>
    <div class="game-container">
        <div class="grid" id="grid"></div>
        <div class="numpad" id="numpad"></div>
        <div class="action-btns">
            <button onclick="eraseCell()">ERASE</button>
            <button onclick="giveHint()">HINT</button>
            <button onclick="validateSolution()">VALIDATE</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        let puzzle = [], solution = [], board = [], given = [];
        let selectedCell = null, timerInterval = null, seconds = 0, hintsLeft = 3;

        function generateSudoku(difficulty) {
            const base = [
                [5,3,4,6,7,8,9,1,2],[6,7,2,1,9,5,3,4,8],[1,9,8,3,4,2,5,6,7],
                [8,5,9,7,6,1,4,2,3],[4,2,6,8,5,3,7,9,1],[7,1,3,9,2,4,8,5,6],
                [9,6,1,5,3,7,2,8,4],[2,8,7,4,1,9,6,3,5],[3,4,5,2,8,6,1,7,9]
            ];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const r1 = Math.floor(Math.random() * 3) * 3;
                    const r2 = Math.floor(Math.random() * 3);
                    const c1 = Math.floor(Math.random() * 3) * 3;
                    const c2 = Math.floor(Math.random() * 3);
                    const tmp = base[i][r1 + c2];
                    base[i][r1 + c2] = base[i][r1 + ((c2 + r2) % 3)];
                    base[i][r1 + ((c2 + r2) % 3)] = tmp;
                }
            }
            for (let i = 0; i < 200; i++) {
                const type = Math.floor(Math.random() * 3);
                const a = Math.floor(Math.random() * 9);
                const b = Math.floor(Math.random() * 9);
                const c = Math.floor(Math.random() * 9);
                if (type === 0 && b !== c) {
                    for (let j = 0; j < 9; j++) {
                        const tmp = base[j][a * 3 + b];
                        base[j][a * 3 + b] = base[j][a * 3 + c];
                        base[j][a * 3 + c] = tmp;
                    }
                } else if (type === 1 && b !== c) {
                    for (let j = 0; j < 9; j++) {
                        const tmp = base[a * 3 + b][j];
                        base[a * 3 + b][j] = base[a * 3 + c][j];
                        base[a * 3 + c][j] = tmp;
                    }
                } else {
                    if (b !== c) {
                        const tmp = base[b].slice();
                        base[b] = base[c].slice();
                        base[c] = tmp;
                    }
                }
            }
            solution = base.map(r => [...r]);
            const remove = { easy: 30, medium: 45, hard: 55 }[difficulty];
            puzzle = solution.map(r => [...r]);
            let removed = 0;
            while (removed < remove) {
                const r = Math.floor(Math.random() * 9);
                const c = Math.floor(Math.random() * 9);
                if (puzzle[r][c] !== 0) {
                    puzzle[r][c] = 0;
                    removed++;
                }
            }
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board = puzzle.map(r => r.map(v => v));
            given = puzzle.map(r => r.map(v => v !== 0));
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    if (puzzle[r][c] !== 0) {
                        cell.textContent = puzzle[r][c];
                        cell.classList.add('given');
                    }
                    cell.onclick = () => selectCell(r, c);
                    grid.appendChild(cell);
                }
            }
        }

        function createNumpad() {
            const numpad = document.getElementById('numpad');
            numpad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.onclick = () => placeNumber(i);
                numpad.appendChild(btn);
            }
        }

        function selectCell(r, c) {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected', 'highlight');
            });
            selectedCell = { r, c };
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.classList.add('selected');
            const boxR = Math.floor(r / 3) * 3;
            const boxC = Math.floor(c / 3) * 3;
            for (let i = 0; i < 9; i++) {
                document.getElementById(`cell-${r}-${i}`).classList.add('highlight');
                document.getElementById(`cell-${i}-${c}`).classList.add('highlight');
            }
            for (let i = boxR; i < boxR + 3; i++) {
                for (let j = boxC; j < boxC + 3; j++) {
                    document.getElementById(`cell-${i}-${j}`).classList.add('highlight');
                }
            }
        }

        function placeNumber(num) {
            if (!selectedCell) return;
            const { r, c } = selectedCell;
            if (given[r][c]) return;
            board[r][c] = num;
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.textContent = num;
            cell.classList.add('user-input');
            checkConflicts();
        }

        function eraseCell() {
            if (!selectedCell) return;
            const { r, c } = selectedCell;
            if (given[r][c]) return;
            board[r][c] = 0;
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.textContent = '';
            cell.classList.remove('user-input', 'conflict');
            checkConflicts();
        }

        function checkConflicts() {
            document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('conflict'));
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) continue;
                    const val = board[r][c];
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    let conflict = false;
                    for (let i = 0; i < 9; i++) {
                        if (i !== c && board[r][i] === val) conflict = true;
                        if (i !== r && board[i][c] === val) conflict = true;
                    }
                    const boxR = Math.floor(r / 3) * 3;
                    const boxC = Math.floor(c / 3) * 3;
                    for (let i = boxR; i < boxR + 3; i++) {
                        for (let j = boxC; j < boxC + 3; j++) {
                            if (i !== r && j !== c && board[i][j] === val) conflict = true;
                        }
                    }
                    if (conflict) cell.classList.add('conflict');
                }
            }
        }

        function giveHint() {
            if (hintsLeft <= 0) {
                document.getElementById('message').textContent = 'No hints left!';
                document.getElementById('message').className = 'message error';
                return;
            }
            const emptyCells = [];
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0 || board[r][c] !== solution[r][c]) {
                        emptyCells.push({ r, c });
                    }
                }
            }
            if (emptyCells.length === 0) return;
            const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = solution[r][c];
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.textContent = solution[r][c];
            cell.classList.add('user-input');
            hintsLeft--;
            document.getElementById('hints').textContent = hintsLeft;
            selectCell(r, c);
            checkConflicts();
            document.getElementById('message').textContent = 'Hint used!';
            document.getElementById('message').className = 'message hint';
        }

        function validateSolution() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] !== solution[r][c]) {
                        document.getElementById('message').textContent = 'Not yet! Keep going.';
                        document.getElementById('message').className = 'message error';
                        return;
                    }
                }
            }
            clearInterval(timerInterval);
            document.getElementById('message').textContent = `Congratulations! Solved in ${formatTime(seconds)}`;
            document.getElementById('message').className = 'message win';
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            document.getElementById('timer').textContent = '00:00';
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').textContent = formatTime(seconds);
            }, 1000);
        }

        function newGame() {
            const difficulty = document.getElementById('difficulty').value;
            hintsLeft = 3;
            document.getElementById('hints').textContent = hintsLeft;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            selectedCell = null;
            generateSudoku(difficulty);
            createGrid();
            createNumpad();
            startTimer();
        }

        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 9) placeNumber(num);
            if (e.key === 'Backspace' || e.key === 'Delete') eraseCell();
            if (selectedCell) {
                let { r, c } = selectedCell;
                if (e.key === 'ArrowUp' && r > 0) r--;
                if (e.key === 'ArrowDown' && r < 8) r++;
                if (e.key === 'ArrowLeft' && c > 0) c--;
                if (e.key === 'ArrowRight' && c < 8) c++;
                selectCell(r, c);
            }
        });

        newGame();
    </script>
</body>
</html>
