<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTAX // Flappy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.container{text-align:center}
h1{font-size:2rem;margin-bottom:5px;background:linear-gradient(135deg,#00f0ff,#b537f2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:.85rem;color:#666;margin-bottom:15px;letter-spacing:2px}
canvas{border:2px solid #222;border-radius:8px;display:block;margin:0 auto;cursor:pointer;background:#0d0d1a}
.score-display{font-size:2.5rem;font-weight:900;color:#00f0ff;text-shadow:0 0 20px #00f0ff60;margin:10px 0}
.info{font-size:.75rem;color:#555;margin-top:10px}
.controls{margin-top:15px;display:flex;gap:10px;justify-content:center}
button{background:linear-gradient(135deg,#00f0ff,#b537f2);border:none;color:#0a0a14;padding:10px 25px;border-radius:6px;font-size:.85rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:opacity .2s}
button:hover{opacity:.85}
</style>
</head>
<body>
<div class="container">
<h1>FLAPPY BIRD</h1>
<div class="subtitle">SYNTAX // BROWSER GAMES</div>
<div class="score-display" id="scoreText">0</div>
<canvas id="c" width="360" height="540"></canvas>
<div class="info">Click or Space to flap</div>
<div class="controls"><button onclick="init()">NEW GAME</button></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('scoreText');
const W=360,H=540,GRAV=0.35,FLAP=-6.5,GAP=140,GW=60,SPEED=2.5,BIRDX=80;
let bird,pipe,score,state,best=parseInt(localStorage.getItem('fbest'))||0;
function init(){bird={y:H/2,vy:0,r:14,rot:0};pipe=[];score=0;state='ready';scoreEl.textContent='0';requestAnimationFrame(loop)}
function flap(){if(state==='over'){init();return}if(state==='ready'){state='play'}bird.vy=FLAP}
function addPipe(){let g=80+Math.random()*(H-GAP-160);pipe.push({x:W,top:g,bot:g+GAP,scored:false})}
function update(){
if(state!=='play')return;
bird.vy+=GRAV;bird.y+=bird.vy;
bird.rot=Math.min(Math.max(bird.vy*3,-30),90);
if(bird.y<bird.r||bird.y>H-bird.r){state='over';if(score>best){best=score;localStorage.setItem('fbest',best)}return}
if(!pipe.length||pipe[pipe.length-1].x<W-200)addPipe();
pipe.forEach(p=>{p.x-=SPEED;
if(!p.scored&&p.x+GW<BIRDX){p.scored=true;score++;scoreEl.textContent=score}
});
pipe=pipe.filter(p=>p.x>-GW);
for(let p of pipe){if(BIRDX+bird.r>p.x&&BIRDX-bird.r<p.x+GW){if(bird.y-bird.r<p.top||bird.y+bird.r>p.bot){state='over';if(score>best){best=score;localStorage.setItem('fbest',best)}return}}}
}
function draw(){
ctx.clearRect(0,0,W,H);
ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
for(let i=0;i<10;i++){ctx.fillStyle='#ffffff08';ctx.fillRect(0,i*60-20,600,2)}
ctx.fillStyle='#b537f230';
for(let p of pipe){ctx.fillRect(p.x,0,GW,p.top);ctx.fillRect(p.x,p.bot,GW,H-p.bot);
ctx.fillStyle='#b537f280';ctx.fillRect(p.x-2,p.top-10,GW+4,10);ctx.fillRect(p.x-2,p.bot,GW+4,10);
ctx.fillStyle='#b537f230'}
ctx.save();ctx.translate(BIRDX,bird.y);ctx.rotate(bird.rot*Math.PI/180);
ctx.fillStyle='#00f0ff';ctx.beginPath();ctx.arc(0,0,bird.r,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0a0a14';ctx.beginPath();ctx.arc(4,-3,3,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,-4,1.5,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.moveTo(bird.r,0);ctx.lineTo(bird.r+8,-3);ctx.lineTo(bird.r+8,3);ctx.closePath();ctx.fill();
ctx.restore();
if(state==='ready'){ctx.fillStyle='#ffffff40';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('Click or Space to Start',W/2,H/2+60)}
if(state==='over'){ctx.fillStyle='#ff404080';ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-20);ctx.fillStyle='#ffffff60';ctx.font='16px sans-serif';ctx.fillText('Best: '+best,W/2,H/2+15);ctx.fillText('Click to restart',W/2,H/2+45)}
}
let raf;
function loop(){update();draw();raf=requestAnimationFrame(loop)}
canvas.addEventListener('click',flap);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap()}});
init();
</script>
</body>
</html>
