<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTAX // Tic Tac Toe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
h1{font-size:1.5rem;margin-bottom:0.5rem;color:#00f0ff;text-shadow:0 0 10px #00f0ff44}
h1 span{color:#b537f2}
.scores{display:flex;gap:2rem;margin:0.5rem 0;font-size:0.9rem}
.scores .s{text-align:center}
.scores .s .val{font-size:1.8rem;font-weight:bold;color:#00f0ff}
.scores .c .val{color:#b537f2}
.scores .t .val{color:#666}
.controls{display:flex;gap:0.5rem;margin-bottom:0.8rem}
.controls button{background:#111;border:1px solid #333;color:#aaa;padding:0.3rem 0.8rem;font-family:inherit;cursor:pointer;border-radius:3px;transition:all .2s}
.controls button:hover,.controls button.active{border-color:#00f0ff;color:#00f0ff;box-shadow:0 0 8px #00f0ff33}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:min(320px,90vw);aspect-ratio:1}
.cell{background:#111;border:2px solid #222;display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:bold;cursor:pointer;transition:all .2s;border-radius:4px;user-select:none}
.cell:hover{border-color:#00f0ff55;background:#161622}
.cell.x{color:#00f0ff;text-shadow:0 0 15px #00f0ff66}
.cell.o{color:#b537f2;text-shadow:0 0 15px #b537f266}
.cell.win{animation:pulse .6s infinite alternate}
@keyframes pulse{from{background:#111}to{background:#1a1a2e}}
.message{margin-top:1rem;font-size:1rem;min-height:1.5rem;color:#00f0ff}
.restart{margin-top:0.8rem;background:#111;border:1px solid #b537f2;color:#b537f2;padding:0.5rem 1.5rem;font-family:inherit;cursor:pointer;font-size:0.9rem;border-radius:3px;transition:all .2s}
.restart:hover{background:#b537f2;color:#0a0a14;box-shadow:0 0 12px #b537f244}
</style>
</head>
<body>
<h1>SYNTAX <span>// Tic Tac Toe</span></h1>
<div class="scores">
<div class="s x"><div class="val" id="xScore">0</div>X</div>
<div class="s t"><div class="val" id="tScore">0</div>TIE</div>
<div class="s c"><div class="val" id="oScore">0</div>O</div>
</div>
<div class="controls">
<button class="active" onclick="setDiff('easy')">Easy</button>
<button onclick="setDiff('medium')">Medium</button>
<button onclick="setDiff('hard')">Hard</button>
</div>
<div class="board" id="board"></div>
<div class="message" id="message">Your turn (X)</div>
<button class="restart" onclick="resetGame()">Restart</button>
<script>
let board,turn,scores={x:0,o:0,t:0},diff='hard',gameOver=false;
const cells=[];
function setDiff(d){diff=d;document.querySelectorAll('.controls button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===d));resetGame()}
function init(){
const b=document.getElementById('board');b.innerHTML='';cells.length=0;
for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.onclick=()=>clickCell(i);b.appendChild(c);cells.push(c)}
resetGame()
}
function resetGame(){board=Array(9).fill('');turn='X';gameOver=false;cells.forEach(c=>{c.textContent='';c.className='cell'});document.getElementById('message').textContent='Your turn (X)'}
function clickCell(i){if(board[i]||turn!=='X'||gameOver)return;makeMove(i,'X');if(!gameOver)setTimeout(aiMove,200)}
function makeMove(i,p){board[i]=p;cells[i].textContent=p;cells[i].classList.add(p.toLowerCase());const w=checkWin(board,p);if(w){endGame(w,p);return}if(!board.includes('')){endGame(null);return}turn=turn==='X'?'O':'X';if(turn==='X'&&!gameOver)document.getElementById('message').textContent='Your turn (X)'}
function aiMove(){if(gameOver)return;let move;
if(diff==='easy'){const e=board.map((v,i)=>v===''?i:null).filter(v=>v!==null);move=e[Math.floor(Math.random()*e.length)]}
else if(diff==='medium'){move=Math.random()<0.6?bestMove():randomMove()}
else{move=bestMove()}
makeMove(move,'O');document.getElementById('message').textContent='Computer placed O'}
function randomMove(){const e=board.map((v,i)=>v===''?i:null).filter(v=>v!==null);return e[Math.floor(Math.random()*e.length)]}
function bestMove(){let best=-2,move=-1;for(let i=0;i<9;i++){if(!board[i]){board[i]='O';let s=minimax(board,0,false);board[i]='';if(s>best){best=s;move=i}}}return move}
function minimax(b,d,isMax){
const w=checkWin(b,'O');if(w)return 10-d;const l=checkWin(b,'X');if(l)return d-10;if(!b.includes(''))return 0;
if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,d+1,false));b[i]=''}}return best}
else{let best=Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,d+1,true));b[i]=''}}return best}}
const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function checkWin(b,p){for(const l of lines){if(l.every(i=>b[i]===p))return l}return null}
function endGame(win,p){gameOver=true;if(win){win.forEach(i=>cells[i].classList.add('win'));scores[p.toLowerCase()]++;document.getElementById('message').textContent=(p==='X'?'You win!':'Computer wins!')+' 🎉'}
else{scores.t++;document.getElementById('message').textContent='Tie game!'}
document.getElementById('xScore').textContent=scores.x;document.getElementById('oScore').textContent=scores.o;document.getElementById('tScore').textContent=scores.t}
init()
</script>
</body>
</html>
