<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTAX // Hangman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f0ff, #b537f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #888; margin-bottom: 20px; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            font-family: inherit;
            padding: 8px 16px;
            background: #1a1a2e;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            cursor: pointer;
            font-size: 1rem;
        }
        select:hover, button:hover {
            background: #00f0ff;
            color: #0a0a14;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        canvas {
            border: 2px solid #b537f2;
            background: #1a1a2e;
        }
        .word-display {
            font-size: 2rem;
            letter-spacing: 10px;
            color: #00f0ff;
            min-height: 40px;
        }
        .category { color: #b537f2; font-size: 1.2rem; margin-bottom: 10px; }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            max-width: 600px;
        }
        .key {
            width: 40px;
            height: 40px;
            font-family: inherit;
            font-size: 1rem;
            background: #1a1a2e;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .key:hover:not(:disabled) {
            background: #00f0ff;
            color: #0a0a14;
        }
        .key:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .key.wrong {
            border-color: #ff4444;
            color: #ff4444;
        }
        .key.correct {
            border-color: #44ff44;
            color: #44ff44;
        }
        .message {
            font-size: 1.5rem;
            margin: 10px 0;
            min-height: 40px;
        }
        .message.win { color: #44ff44; }
        .message.lose { color: #ff4444; }
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 10px;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; color: #00f0ff; }
        .stat-label { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <h1>SYNTAX // Hangman</h1>
    <div class="subtitle">Guess the word before it's too late</div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="wins">0</div>
            <div class="stat-label">WINS</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="losses">0</div>
            <div class="stat-label">LOSSES</div>
        </div>
    </div>

    <div class="controls">
        <select id="category">
            <option value="animals">Animals</option>
            <option value="countries">Countries</option>
            <option value="food">Food</option>
            <option value="tech">Technology</option>
        </select>
        <select id="difficulty">
            <option value="easy">Easy (8 lives)</option>
            <option value="medium" selected>Medium (6 lives)</option>
            <option value="hard">Hard (4 lives)</option>
        </select>
        <button onclick="newGame()">NEW GAME</button>
    </div>

    <div class="game-container">
        <canvas id="hangman" width="200" height="250"></canvas>
        <div class="category" id="categoryLabel">Category: Animals</div>
        <div class="word-display" id="wordDisplay"></div>
        <div class="message" id="message"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        const words = {
            animals: ['elephant', 'giraffe', 'penguin', 'dolphin', 'cheetah', 'octopus', 'kangaroo', 'flamingo', 'chameleon', 'hedgehog', 'butterfly', 'crocodile', 'platypus', 'rhinoceros', 'squirrel'],
            countries: ['australia', 'brazil', 'canada', 'denmark', 'egypt', 'france', 'germany', 'hungary', 'iceland', 'jamaica', 'kenya', 'mexico', 'norway', 'portugal', 'thailand'],
            food: ['avocado', 'broccoli', 'chocolate', 'dumpling', 'espresso', 'focaccia', 'guacamole', 'hamburger', 'jalapeno', 'ketchup', 'lasagna', 'mushroom', 'pancakes', 'ravioli', 'spaghetti'],
            tech: ['algorithm', 'bluetooth', 'compiler', 'database', 'ethernet', 'firmware', 'gateway', 'hardware', 'internet', 'keyboard', 'laptop', 'malware', 'network', 'software', 'terminal']
        };

        let currentWord = '';
        let guessedLetters = new Set();
        let wrongGuesses = 0;
        let maxLives = 6;
        let wins = 0;
        let losses = 0;
        let gameActive = true;

        const canvas = document.getElementById('hangman');
        const ctx = canvas.getContext('2d');

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = letter;
                btn.id = `key-${letter}`;
                btn.onclick = () => guessLetter(letter);
                keyboard.appendChild(btn);
            }
        }

        function drawHangman() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#b537f2';
            ctx.lineWidth = 3;

            // Base
            ctx.beginPath();
            ctx.moveTo(20, 230);
            ctx.lineTo(100, 230);
            ctx.stroke();

            // Pole
            ctx.beginPath();
            ctx.moveTo(60, 230);
            ctx.lineTo(60, 30);
            ctx.stroke();

            // Top
            ctx.beginPath();
            ctx.moveTo(60, 30);
            ctx.lineTo(140, 30);
            ctx.stroke();

            // Rope
            ctx.beginPath();
            ctx.moveTo(140, 30);
            ctx.lineTo(140, 50);
            ctx.stroke();

            ctx.strokeStyle = '#00f0ff';

            if (wrongGuesses >= 1) {
                // Head
                ctx.beginPath();
                ctx.arc(140, 70, 20, 0, Math.PI * 2);
                ctx.stroke();
            }
            if (wrongGuesses >= 2) {
                // Body
                ctx.beginPath();
                ctx.moveTo(140, 90);
                ctx.lineTo(140, 150);
                ctx.stroke();
            }
            if (wrongGuesses >= 3) {
                // Left arm
                ctx.beginPath();
                ctx.moveTo(140, 110);
                ctx.lineTo(110, 130);
                ctx.stroke();
            }
            if (wrongGuesses >= 4) {
                // Right arm
                ctx.beginPath();
                ctx.moveTo(140, 110);
                ctx.lineTo(170, 130);
                ctx.stroke();
            }
            if (wrongGuesses >= 5) {
                // Left leg
                ctx.beginPath();
                ctx.moveTo(140, 150);
                ctx.lineTo(110, 190);
                ctx.stroke();
            }
            if (wrongGuesses >= 6) {
                // Right leg
                ctx.beginPath();
                ctx.moveTo(140, 150);
                ctx.lineTo(170, 190);
                ctx.stroke();
            }
        }

        function updateWordDisplay() {
            const display = currentWord.split('').map(letter =>
                guessedLetters.has(letter) ? letter : '_'
            ).join(' ');
            document.getElementById('wordDisplay').textContent = display;
        }

        function guessLetter(letter) {
            if (!gameActive || guessedLetters.has(letter)) return;

            guessedLetters.add(letter);
            const btn = document.getElementById(`key-${letter}`);
            btn.disabled = true;

            if (currentWord.includes(letter)) {
                btn.classList.add('correct');
                updateWordDisplay();
                checkWin();
            } else {
                btn.classList.add('wrong');
                wrongGuesses++;
                drawHangman();
                checkLose();
            }
        }

        function checkWin() {
            const won = currentWord.split('').every(letter => guessedLetters.has(letter));
            if (won) {
                wins++;
                document.getElementById('wins').textContent = wins;
                document.getElementById('message').textContent = 'YOU WIN!';
                document.getElementById('message').className = 'message win';
                gameActive = false;
                disableAllKeys();
            }
        }

        function checkLose() {
            if (wrongGuesses >= maxLives) {
                losses++;
                document.getElementById('losses').textContent = losses;
                document.getElementById('message').textContent = `Game Over! Word: ${currentWord}`;
                document.getElementById('message').className = 'message lose';
                gameActive = false;
                revealWord();
                disableAllKeys();
            }
        }

        function revealWord() {
            const display = currentWord.split('').map(letter =>
                guessedLetters.has(letter) ? letter : letter
            ).join(' ');
            document.getElementById('wordDisplay').textContent = display;
        }

        function disableAllKeys() {
            document.querySelectorAll('.key').forEach(btn => btn.disabled = true);
        }

        function newGame() {
            const category = document.getElementById('category').value;
            const difficulty = document.getElementById('difficulty').value;

            const lives = { easy: 8, medium: 6, hard: 4 };
            maxLives = lives[difficulty];
            wrongGuesses = 0;
            guessedLetters.clear();
            gameActive = true;

            const wordList = words[category];
            currentWord = wordList[Math.floor(Math.random() * wordList.length)].toLowerCase();

            document.getElementById('categoryLabel').textContent = `Category: ${category.charAt(0).toUpperCase() + category.slice(1)}`;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';

            createKeyboard();
            drawHangman();
            updateWordDisplay();
        }

        document.addEventListener('keydown', (e) => {
            const letter = e.key.toUpperCase();
            if (letter.length === 1 && letter >= 'A' && letter <= 'Z') {
                guessLetter(letter);
            }
        });

        newGame();
    </script>
</body>
</html>
