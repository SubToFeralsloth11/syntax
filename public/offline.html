<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08080f">
  <title>No Connection — Syntax</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap">
  <style>
    :root {
      --bg: #08080f;
      --text: #e8e8ff;
      --text-muted: #7a7a9e;
      --cyan: #00f0ff;
      --purple: #b537f2;
      --magenta: #ff2bd6;
      --error: #ff5566;
      --success: #44dd88;
      --border: rgba(0, 240, 255, 0.12);
      --radius: 14px;
      --radius-sm: 9px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 0%, transparent 75%);
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 0%, transparent 75%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      padding: 56px 40px 48px;
    }
    .icon-block {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(181,55,242,0.15));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
    }
    .icon {
      font-size: 2.6rem;
      filter: drop-shadow(0 0 10px rgba(0,240,255,0.5));
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 28px;
      font-size: 0.95rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #04121a;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 24px rgba(0,240,255,0.4); }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(0,240,255,0.4);
      color: var(--cyan);
    }
    .btn-outline:hover { background: rgba(0,240,255,0.1); box-shadow: 0 0 18px rgba(0,240,255,0.25); }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .status-bar {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--text-muted);
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--error);
      display: inline-block;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 8px var(--error);
    }
    .dot.connected { background: var(--success); animation: none; box-shadow: 0 0 8px var(--success); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-block">
      <span class="icon">&#128268;</span>
    </div>
    <h1>No Connection</h1>
    <p>// syntax is unreachable right now. the server may be offline or restarting. your data is safe.</p>
    <div class="actions">
      <button class="btn" onclick="retry()">&#x21bb; Try Again</button>
      <button class="btn btn-outline" onclick="location.reload()">Refresh</button>
    </div>
    <div class="status-bar">
      <span class="dot" id="dot"></span>
      <span id="status">Checking connection...</span>
    </div>
  </div>
  <script>
    var attempts = 0;
    var interval = null;

    function update(status, connected) {
      var s = document.getElementById('status');
      var d = document.getElementById('dot');
      s.textContent = status;
      d.className = connected ? 'dot connected' : 'dot';
    }

    function retry() {
      var btn = document.querySelector('.btn');
      btn.disabled = true;
      btn.innerHTML = '&#x21bb; Trying...';
      fetch('/')
        .then(function(r) {
          if (r.ok) location.reload();
          else update('Server returned ' + r.status + ' — still down', false);
        })
        .catch(function() {
          update('Still no connection — keep waiting', false);
        })
        .finally(function() {
          btn.disabled = false;
          btn.innerHTML = '&#x21bb; Try Again';
        });
    }

    function poll() {
      attempts++;
      if (!navigator.onLine) {
        update('No internet connection', false);
        return;
      }
      update('Server unreachable — checking... (' + attempts + ')', false);
      fetch('/')
        .then(function(r) {
          if (r.ok) {
            update('Server is back online! Redirecting...', true);
            clearInterval(interval);
            setTimeout(function() { location.reload(); }, 800);
          }
        })
        .catch(function() {
          update('Server offline — retry #' + attempts, false);
        });
    }

    update('Checking connection...', false);
    poll();
    interval = setInterval(poll, 8000);
  </script>
</body>
</html>
