<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1e"/>
      <stop offset="50%" style="stop-color:#12062e"/>
      <stop offset="100%" style="stop-color:#0a0a1e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <filter id="f">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="1" y="1" width="398" height="298" rx="8" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="115" r="45" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.25"/>
  <circle cx="200" cy="115" r="60" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.12"/>
  <circle cx="200" cy="115" r="75" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.08"/>
  <g filter="url(#f)">
    <text x="200" y="125" text-anchor="middle" font-family="'Orbitron',monospace,sans-serif" font-size="24" font-weight="900" fill="#00f0ff" letter-spacing="3">SPACE INVADERS</text>
  </g>
  <line x1="80" y1="170" x2="320" y2="170" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
  <text x="200" y="195" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#ff4444" opacity="0.5" letter-spacing="6">PLAY NOW</text>
</svg>