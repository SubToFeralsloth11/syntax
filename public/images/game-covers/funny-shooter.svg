<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aee7ff"/>
      <stop offset="100%" stop-color="#8fd7ff"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#b537f2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg)"/>
  <!-- ground -->
  <rect x="0" y="190" width="400" height="60" fill="#5fb877"/>
  <rect x="0" y="185" width="400" height="8" fill="#4ca867"/>
  <!-- clouds -->
  <ellipse cx="80" cy="50" rx="35" ry="18" fill="#fff" opacity="0.8"/>
  <ellipse cx="110" cy="55" rx="28" ry="14" fill="#fff" opacity="0.8"/>
  <ellipse cx="300" cy="40" rx="30" ry="16" fill="#fff" opacity="0.8"/>
  <!-- character (boy) -->
  <circle cx="140" cy="140" r="22" fill="#fdb462"/>
  <rect x="125" y="158" width="30" height="30" rx="6" fill="#4a90d9"/>
  <circle cx="133" cy="137" r="4" fill="#fff"/>
  <circle cx="133" cy="137" r="2" fill="#000"/>
  <circle cx="147" cy="137" r="4" fill="#fff"/>
  <circle cx="147" cy="137" r="2" fill="#000"/>
  <path d="M133 148 Q140 153 147 148" stroke="#000" stroke-width="2" fill="none"/>
  <!-- gun -->
  <rect x="160" y="148" width="28" height="8" rx="3" fill="#333"/>
  <rect x="184" y="146" width="6" height="12" rx="2" fill="#555"/>
  <!-- target enemy -->
  <circle cx="280" cy="135" r="18" fill="#e74c3c"/>
  <rect x="268" y="150" width="24" height="24" rx="5" fill="#c0392b"/>
  <circle cx="274" cy="132" r="3" fill="#fff"/>
  <circle cx="274" cy="132" r="1.5" fill="#000"/>
  <circle cx="286" cy="132" r="3" fill="#fff"/>
  <circle cx="286" cy="132" r="1.5" fill="#000"/>
  <path d="M274 142 L286 142" stroke="#000" stroke-width="2"/>
  <!-- bullet -->
  <circle cx="220" cy="152" r="4" fill="#ffd166"/>
  <circle cx="220" cy="152" r="6" fill="#ffd166" opacity="0.4"/>
  <!-- title -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="20" fill="#04324a">FUNNY SHOOTER</text>
  <!-- crosshair -->
  <circle cx="280" cy="135" r="26" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="105" x2="280" y2="115" stroke="url(#neon)" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="155" x2="280" y2="165" stroke="url(#neon)" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="135" x2="260" y2="135" stroke="url(#neon)" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="135" x2="310" y2="135" stroke="url(#neon)" stroke-width="2" opacity="0.5"/>
</svg>
